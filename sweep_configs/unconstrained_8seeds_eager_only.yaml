# Unconstrained baseline: only revert attn_implementation to eager.
# Tests whether eager vs sdpa is the sole cause of the behavioral gap.
#
# Usage:
#   modal deploy modal_runner.py
#   modal run modal_runner.py --sweep sweep_configs/unconstrained_8seeds_eager_only.yaml

name: unconstrained_eager_only
base_config: cpc_llm
cache: false
overrides:
  - initial_sft.args.model_config.attn_implementation=eager
  - sft.args.model_config.attn_implementation=eager

parameters:
  initial_seed: [0, 1, 2, 3, 4, 5, 6, 7]
  conformal_policy_control.alpha: [1.0]
